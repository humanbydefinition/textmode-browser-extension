name: Feature request
description: Suggest a user-facing improvement
title: 'feat: '
labels:
    - enhancement
body:
    - type: markdown
      attributes:
          value: |
              Thanks for suggesting an improvement. Features that affect permissions, privacy, browser support, exports, or runtime architecture should explain the user workflow clearly.
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What workflow or limitation should this improve?
      validations:
          required: true
    - type: textarea
      id: proposal
      attributes:
          label: Proposal
          description: What would you like to happen?
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Optional. What other approaches did you consider?
    - type: dropdown
      id: affected-area
      attributes:
          label: Affected area
          options:
              - Media picking
              - Overlay rendering
              - Overlay settings
              - Export
              - Popup
              - In-page panel
              - Browser support
              - Permissions or privacy
              - Build or release process
              - Documentation
              - Other
      validations:
          required: true
    - type: checkboxes
      id: browser-impact
      attributes:
          label: Browser impact
          options:
              - label: Chrome
              - label: Edge
              - label: Firefox
              - label: Safari
              - label: Not browser-specific
    - type: checkboxes
      id: checks
      attributes:
          label: Pre-flight checks
          options:
              - label: I searched existing issues and pull requests.
                required: true
              - label: I understand permission or privacy changes need maintainer agreement before implementation.
                required: true
