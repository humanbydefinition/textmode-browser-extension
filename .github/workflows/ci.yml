name: CI

on:
    pull_request:
    push:
        branches:
            - main
            - dev

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        env:
            FIREFOX_EXTENSION_ID: mozilla-extension-id@placeholder.com

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run checks
              run: npm run check
